<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBT Exam Simulator - Exam</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar exam-navbar">
      <div class="navbar-container">
        <div class="logo">
          <h1>CBT Exam</h1>
        </div>
        <div class="course-selector-container">
          <label for="courseSelector" class="course-label">Course:</label>
          <select id="courseSelector" class="course-selector">
            <option value="">-- Select Course --</option>
          </select>
        </div>
        <div class="exam-info">
          <div class="timer-display">
            <span class="timer-text">Time: <strong id="timer">30:00</strong></span>
          </div>
          <div class="subject-display">
            <span class="subject-text" id="courseCodeDisplay"></span>
          </div>
        </div>
        <div class="exam-actions">
          <button
            id="terminateBtn"
            class="btn btn-exit btn-small"
            title="Exit exam"
          >
            Exit
          </button>
        </div>
      </div>
    </header>

    <main class="exam-container">
      <aside class="question-sidebar">
        <div class="sidebar-header">
          <h3>Questions</h3>
          <div class="progress-info">
            <span id="currentQuestionNum">1</span> /
            <span id="totalQuestionsNum">--</span>
          </div>
        </div>

        <div class="question-list">
          <div id="questionListContainer"></div>
        </div>

        <div class="sidebar-footer">
          <div class="stats">
            <div class="stat-item answered">
              <span class="stat-color"></span>
              <span class="stat-label"
                >Answered: <span id="answeredCount">0</span></span
              >
            </div>
            <div class="stat-item unanswered">
              <span class="stat-color"></span>
              <span class="stat-label"
                >Unanswered: <span id="unansweredCount">0</span></span
              >
            </div>
          </div>
        </div>
      </aside>

      <section class="exam-content">
        <div class="question-display">
          <div class="question-header">
            <h3 id="questionNumber">Question 1</h3>
          </div>

          <div class="question-text">
            <p id="questionContent"></p>
            <div id="questionImageContainer" style="display: none">
              <img id="questionImage" alt="Question image" style="max-width: 100%; margin-top: 12px" />
            </div>
          </div>

          <div class="options-container">
            <div id="optionsContainer"></div>
          </div>

          <div class="question-navigation">
            <button class="btn btn-secondary" id="prevBtn" disabled>
              Previous
            </button>
            <button class="btn btn-secondary" id="nextBtn">Next</button>
            <button class="btn btn-primary" id="submitBtn">Submit Exam</button>
          </div>

          <div
            class="explanation-box"
            id="explanationBox"
            style="display: none"
          >
            <h4>Explanation</h4>
            <p id="explanationText"></p>
          </div>
        </div>
      </section>
    </main>

    <div class="modal" id="confirmModal">
      <div class="modal-content">
        <h3>Confirm Submission</h3>
        <p id="confirmMessage"></p>
        <div class="modal-buttons">
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button class="btn btn-primary" id="confirmBtn">Submit</button>
        </div>
      </div>
    </div>

    <div class="modal" id="exitModal">
      <div class="modal-content">
        <h3>Exit Exam?</h3>
        <p id="exitMessage">All progress will be lost. Are you sure?</p>
        <div class="modal-buttons">
          <button class="btn btn-secondary" id="exitCancelBtn">Cancel</button>
          <button class="btn btn-exit" id="exitConfirmBtn">Exit Exam</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop"></div>

    <script src="js/course-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/exam.js"></script>
  </body>
</html>
